<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Times Table Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Settings Screen -->
    <div id="settings-screen" class="screen active">
      <h1>🧮 Times Table Quiz</h1>
      <p class="subtitle">Test your multiplication skills!</p>

      <div class="settings-group">
        <label for="table-select">Which tables to practice:</label>
        <div class="table-grid" id="table-grid"></div>
        <div class="select-actions">
          <button type="button" id="select-all-btn" class="link-btn">Select All</button>
          <button type="button" id="deselect-all-btn" class="link-btn">Deselect All</button>
        </div>
      </div>

      <div class="settings-group">
        <label for="num-questions">Number of questions:</label>
        <select id="num-questions">
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="30">30</option>
          <option value="50">50</option>
        </select>
      </div>

      <div class="settings-group">
        <label for="time-limit">Time limit per question:</label>
        <select id="time-limit">
          <option value="0">No limit</option>
          <option value="5">5 seconds</option>
          <option value="10" selected>10 seconds</option>
          <option value="15">15 seconds</option>
          <option value="30">30 seconds</option>
        </select>
      </div>

      <button id="start-btn" class="btn primary">Start Quiz</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen">
      <div class="quiz-header">
        <span id="progress">1 / 20</span>
        <span id="score-display">Score: 0</span>
        <span id="timer-display"></span>
      </div>

      <div class="question-area">
        <div id="question" class="question">7 &times; 8 = ?</div>
        <div id="feedback" class="feedback"></div>
        <div id="choices" class="choices"></div>
      </div>

      <div class="quiz-footer">
        <button id="quit-btn" class="btn secondary">Quit</button>
      </div>
    </div>

    <!-- Results Screen -->
    <div id="results-screen" class="screen">
      <h1>📊 Results</h1>

      <div class="results-summary">
        <div class="stat">
          <span class="stat-value" id="result-score">0</span>
          <span class="stat-label">Correct</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="result-total">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="result-percent">0%</span>
          <span class="stat-label">Accuracy</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="result-time">0s</span>
          <span class="stat-label">Total Time</span>
        </div>
      </div>

      <div id="results-detail" class="results-detail"></div>

      <div class="results-actions">
        <button id="retry-btn" class="btn primary">Try Again</button>
        <button id="home-btn" class="btn secondary">Change Settings</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
